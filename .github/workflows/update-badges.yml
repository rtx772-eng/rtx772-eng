name: Update badges

on:
  workflow_dispatch:
  schedule:
    # Runs at 1am UTC on Sunday
    - cron: "0 1 * * 0"

jobs:
  update-readme:
    name: Update Readme with badges
    runs-on: ubuntu-latest
    steps:
      - name: Badges - Readme
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: mohamed-cherradi
          NUMBER_LAST_BADGES: 10
